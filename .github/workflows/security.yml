name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 2 * * *' # Run nightly

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt

      - name: Python Dependency Scan (pip-audit)
        # These advisories have no fix version published yet. They are recorded
        # as accepted here, and Dependabot will alert when patches ship.
        run: |
          pip-audit -r requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --ignore-vuln PYSEC-2026-311 \
            --ignore-vuln PYSEC-2026-597
