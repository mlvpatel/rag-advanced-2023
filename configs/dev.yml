# RAGFlow Development Configuration
# Environment: local development

log_level: DEBUG

rate_limits:
  chat: "60/minute"
  upload: "10/minute"

rag:
  chunk_size: 1000
  chunk_overlap: 200
  top_k: 5
  reranker_top_n: 3

chroma:
  host: null          # null = local file persistence
  port: 8000
  persist_dir: ./chroma_db
  collection_name: ragflow_collection

embedding:
  model: models/text-embedding-004
  provider: google

celery:
  broker: redis://localhost:6379/0
  backend: redis://localhost:6379/0
