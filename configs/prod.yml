# RAGFlow Production Configuration
# Environment: production (Docker Compose / Kubernetes)

log_level: INFO

rate_limits:
  chat: "60/minute"
  upload: "5/minute"   # tighter in prod

rag:
  chunk_size: 1000
  chunk_overlap: 200
  top_k: 5
  reranker_top_n: 3

chroma:
  host: chromadb       # Docker service name
  port: 8000
  collection_name: ragflow_collection

embedding:
  model: models/text-embedding-004
  provider: google

celery:
  broker: redis://redis:6379/0
  backend: redis://redis:6379/0
