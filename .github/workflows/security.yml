name: Security Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 2 * * *' # Run nightly

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip install -r requirements.txt

      - name: Python Dependency Scan (pip-audit)
        # PYSEC-2026-311 is a chromadb server side advisory with no patched
        # release. Not exposed here: embedded mode runs no server, and the
        # optional Docker server pins 0.6.3, below the affected range. See
        # SECURITY.md for the full rationale.
        run: pip-audit --ignore-vuln PYSEC-2026-311
